name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Verify Applet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-size: 'large'
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Type Checks and Linter
        run: npm run lint

      - name: Build Production Application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bitget-ai-bot-production-build
          path: dist/
          retention-days: 5
